name: Publish to PyPI & NPM

# 触发条件：当推送形如 vX.Y.Z 的 tag 时触发
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # ═══════════════════════════════════════════════════════════
  #  阶段 1: 编译 Python Wheels（含 ARM64）
  # ═══════════════════════════════════════════════════════════
  build-wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sdist: true
          - name: Linux ARM64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            sdist: false
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            sdist: false
          - name: macOS x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            sdist: false
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            sdist: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --features python -o dist ${{ matrix.sdist && '--sdist' || '' }}
          rust-toolchain: stable
          # zig 交叉编译器：让 Linux x86 runner 可以编译 ARM64 目标
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  # ═══════════════════════════════════════════════════════════
  #  阶段 2: 发布到 PyPI
  # ═══════════════════════════════════════════════════════════
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ═══════════════════════════════════════════════════════════
  #  阶段 3: 编译 Node.js native addon（含 ARM64）
  # ═══════════════════════════════════════════════════════════
  build-node:
    name: Build Node addon (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macOS x86_64
            runner: macos-13
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux ARM64 交叉编译需要 gcc-aarch64
      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install dependencies
        run: npm install

      - name: Build node module
        run: npx napi build --platform --release --features nodejs --target ${{ matrix.target }}
        env:
          # Linux ARM64 交叉编译需要指定链接器
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Upload node binding
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.name }}
          path: "*.node"

  # ═══════════════════════════════════════════════════════════
  #  阶段 4: 发布到 NPM
  # ═══════════════════════════════════════════════════════════
  release-npm:
    name: Release to NPM
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all bindings
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: node-*
          merge-multiple: true

      # 万能入口：运行时自动加载对应平台的二进制
      - name: Generate JS Loader
        run: |
          cat << 'EOF' > index.js
          const { platform, arch } = process;
          let nativeBinding = null;
          try {
            if (platform === 'win32') { nativeBinding = require('./triviumdb.win32-x64-msvc.node'); }
            else if (platform === 'darwin' && arch === 'arm64') { nativeBinding = require('./triviumdb.darwin-arm64.node'); }
            else if (platform === 'darwin') { nativeBinding = require('./triviumdb.darwin-x64.node'); }
            else if (platform === 'linux' && arch === 'arm64') { nativeBinding = require('./triviumdb.linux-arm64-gnu.node'); }
            else { nativeBinding = require('./triviumdb.linux-x64-gnu.node'); }
          } catch (e) {
            console.error(`TriviumDB failed to load native binding for ${platform} ${arch}`, e);
            throw e;
          }
          module.exports = nativeBinding;
          EOF

      - name: Publish to NPM
        run: |
          npm install
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
