# TriviumDB CI/CD 管线
#
# 包含：
#   1. 编译检查（stable，x86_64 + aarch64 交叉编译）
#   2. 全量测试（跨平台 stable，含 ARM64 原生）
#   3. AddressSanitizer 内存安全检测（nightly, Linux）
#   4. 代码格式检查 & Clippy 静态分析
#   5. 基准测试（手动触发）

name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]
  workflow_dispatch:  # 支持手动触发（用于 benchmark）

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════
  #  Job 1: 编译检查（快速门禁）
  # ═══════════════════════════════════════════
  check:
    name: Compile Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: 编译检查 (x86_64 默认特性)
        run: cargo check --all-targets

      - name: 交叉编译检查 (aarch64)
        run: cargo check --target aarch64-unknown-linux-gnu --lib

  # ═══════════════════════════════════════════
  #  Job 2: 全量测试（跨平台 + ARM64 原生）
  # ═══════════════════════════════════════════
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
          - name: Windows x86_64
            runner: windows-latest
          - name: macOS x86_64
            runner: macos-latest  # Apple Silicon 交叉编译 x86_64
          - name: macOS ARM64 (M-series)
            runner: macos-latest    # macos-latest = Apple Silicon (M1+)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: 运行全量测试
        run: cargo test --lib --tests -- --test-threads=1

      - name: 运行文档测试
        run: cargo test --doc

  # ═══════════════════════════════════════════
  #  Job 2b: ARM64 Linux 原生测试 (QEMU)
  # ═══════════════════════════════════════════
  test-arm64-linux:
    name: Test (Linux ARM64 via QEMU)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64-linux

      - name: 安装交叉编译工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user

      - name: 设置 Cargo 链接器
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          runner = "qemu-aarch64 -L /usr/aarch64-linux-gnu"
          EOF

      - name: 构建测试 (aarch64)
        run: cargo test --target aarch64-unknown-linux-gnu --lib --tests --no-run

      - name: 运行测试 (aarch64 via QEMU)
        run: |
          cargo test --target aarch64-unknown-linux-gnu --lib --tests -- \
            --test-threads=1 \
            --skip HW \
            --skip INTRUDE

  # ═══════════════════════════════════════════
  #  Job 3: AddressSanitizer 内存安全检测
  #
  #  使用 nightly + -Z sanitizer=address 检测：
  #  - 堆缓冲区溢出 (heap-buffer-overflow)
  #  - 释放后使用 (use-after-free)
  #  - 栈缓冲区溢出 (stack-buffer-overflow)
  #  - 内存泄漏 (memory leak)
  #
  #  主要覆盖 TriviumDB 中的 unsafe 区域：
  #  mmap 零拷贝、SIMD 指令、bytemuck 转换
  # ═══════════════════════════════════════════
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src  # ASan 需要从源码编译 std

      - uses: Swatinem/rust-cache@v2
        with:
          key: asan

      - name: 运行测试 (ASan 模式)
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          # ASan 运行时选项：检测泄漏 + 首次错误即停止
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
        run: |
          cargo +nightly test --lib --tests \
            -Z build-std \
            --target x86_64-unknown-linux-gnu \
            -- --test-threads=1

  # ═══════════════════════════════════════════
  #  Job 4: 代码质量检查
  # ═══════════════════════════════════════════
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: 格式检查 (rustfmt)
        run: cargo fmt --all -- --check

      - name: 静态分析 (Clippy)
        run: cargo clippy --all-targets -- -D warnings

  # ═══════════════════════════════════════════
  #  Job 5: 基准测试（仅手动触发）
  # ═══════════════════════════════════════════
  bench:
    name: Benchmark (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: 运行基准测试
        run: cargo bench --workspace

      - name: 上传基准测试结果
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
